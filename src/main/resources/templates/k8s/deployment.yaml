apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{service_name}}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{service_name}}
  template:
    metadata:
      labels:
        app: {{service_name}}
    spec:
      containers:
        - name: {{service_name}}
          image: {{ecr_repo_url}}: latest
          ports:
            - containerPort: 80